<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reviewer</title>
<link rel="stylesheet" href="reviewer.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&display=swap" rel="stylesheet">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="wrap">

  <div class="header">
    <div>
      <p class="eyebrow">SUBJECT:</p>
      <h1 id="subject-title">Subject</h1>
    </div>
    <a href="first-semester.html" class="back-link">← Back to subjects</a>
  </div>

  <div class="state active" id="state-loading">Checking for an uploaded reviewer…</div>

  <div class="state" id="state-empty">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M9 12h6M9 16h4M14 3v4a1 1 0 001 1h4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6 21h12a2 2 0 002-2V8l-5-5H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p class="empty-title">No reviewer uploaded yet</p>
    <p class="empty-sub">This subject doesn't have a PDF reviewer in place. Please try again later.</p>
    <span class="empty-path" id="expected-path">reviewers/subject.pdf</span>
  </div>

  <div class="state" id="state-viewer">
    <div class="viewer-toolbar">
      <div class="file-meta">
        <span class="dot"></span>
        <span class="file-name" id="file-name">reviewer.pdf</span>
      </div>
      <a class="btn btn-download" id="download-btn" download>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download
      </a>
    </div>
    <iframe class="pdf-frame" id="pdf-frame" title="PDF reviewer preview"></iframe>
  </div>

  <p class="empty-note">The file automatically updates whenever a new topic is taught.<br>-Cypherion:)</p>

</div>

<script>
  const subjectNames = {
    'data-structure-and-algorithms': 'Data Structure and Algorithms',
    'networking-1': 'Networking 1',
    'it-elective-1': 'IT Elective 1',
    'it-elective-2': 'IT Elective 2',
    'information-management': 'Information Management',
    'computer-maintenance-and-troubleshooting': 'Computer Maintenance and Troubleshooting'
  };

  const params = new URLSearchParams(window.location.search);
  const subjectKey = params.get('subject') || '';
  const subjectTitle = subjectNames[subjectKey] || (subjectKey ? subjectKey : 'Subject');
  const pdfPath = 'reviewers/' + (subjectKey || 'reviewer') + '.pdf';

  document.getElementById('subject-title').textContent = subjectTitle;
  document.getElementById('expected-path').textContent = pdfPath;

  const stateLoading = document.getElementById('state-loading');
  const stateEmpty = document.getElementById('state-empty');
  const stateViewer = document.getElementById('state-viewer');

  function showState(el) {
    [stateLoading, stateEmpty, stateViewer].forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  fetch(pdfPath, { method: 'HEAD' })
    .then(res => {
      if (res.ok) {
        document.getElementById('pdf-frame').src = pdfPath;
        document.getElementById('file-name').textContent = subjectTitle + ' Reviewer.pdf';
        document.getElementById('download-btn').href = pdfPath;
        document.getElementById('download-btn').download = subjectKey + '.pdf';
        showState(stateViewer);
      } else {
        showState(stateEmpty);
      }
    })
    .catch(() => showState(stateEmpty));
</script>

</body>
</html>
